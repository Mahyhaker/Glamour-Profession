<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh Jo-Ken-Po</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header animate-in">
        <div class="title">Yu-Gi-Oh!</div>
        <div class="subtitle">Jo · Ken · Po · Duel</div>
        <div class="title-divider"></div>
    </div>

    <div class="scoreboard animate-in">
        <div class="scoreboard-panels">
            <div class="score-panel wins">
                <div class="score-label">Vitórias</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-divider"></div>
            <div class="score-panel draws">
                <div class="score-label">Empates</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-divider"></div>
            <div class="score-panel losses">
                <div class="score-label">Derrotas</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        <div class="round-tracker" id="roundTracker">
            <div class="round-pip" id="pip-0"></div>
            <div class="round-pip" id="pip-1"></div>
            <div class="round-pip" id="pip-2"></div>
            <div class="round-pip" id="pip-3"></div>
            <div class="round-pip" id="pip-4"></div>
        </div>
    </div>

    <div class="result-banner animate-in" id="result">
        Escolha uma carta para começar o duelo
    </div>

    <div class="battle-arena animate-in">
        <div class="arena-circle"></div>
        <div class="arena-side">
            <div class="arena-label">Você</div>
            <div class="card-display empty" id="playerDisplayCard"></div>
            <div class="card-display-name" id="playerDisplayName"></div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="arena-side">
            <div class="arena-label">Oponente</div>
            <div class="card-display empty" id="computerDisplayCard"></div>
            <div class="card-display-name" id="computerDisplayName"></div>
        </div>
    </div>

    <div class="hands-section animate-in">
        <div class="hand-wrapper">
            <div class="hand-label">Mão do oponente</div>
            <div class="hand" id="computerHand"></div>
        </div>
        <div class="hand-wrapper">
            <div class="hand-label">Sua mão — escolha uma carta</div>
            <div class="hand" id="playerHand"></div>
        </div>
    </div>

    <div class="rules-legend animate-in">
        <div class="rule-item">
            <span>🐉 Dragão</span>
            <span class="rule-arrow">▶</span>
            <span>Mago Negro</span>
        </div>
        <span class="rule-sep">│</span>
        <div class="rule-item">
            <span>🔮 Mago Negro</span>
            <span class="rule-arrow">▶</span>
            <span>Dragon Slayer</span>
        </div>
        <span class="rule-sep">│</span>
        <div class="rule-item">
            <span>⚔️ Dragon Slayer</span>
            <span class="rule-arrow">▶</span>
            <span>Dragão</span>
        </div>
    </div>

    <button class="start-button" id="startButton">✦ Iniciar Duelo ✦</button>
</div>

<div class="card-tooltip" id="cardTooltip">
    <div class="tooltip-name" id="tooltipName"></div>
    <div class="tooltip-type" id="tooltipType"></div>
    <div class="tooltip-beats" id="tooltipBeats"></div>
</div>

<div class="game-over-overlay" id="gameOverlay">
    <div class="game-over-box">
        <div class="game-over-title" id="gameOverTitle">VITÓRIA!</div>
        <div class="game-over-score" id="gameOverScore">3 · 1 · 1</div>
        <button class="start-button" id="playAgainButton">✦ Jogar Novamente ✦</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
